version: "3.9"

services:

  # ── FastAPI Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: parthi-ai-backend
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app          # hot-reload in dev (remove for prod)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React + Nginx Frontend ──────────────────────────────────
  frontend:
    build:
      context: ./email_frontend
      dockerfile: Dockerfile
    container_name: parthi-ai-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Ollama Local LLM (optional — comment out if not needed) ─
  ollama:
    image: ollama/ollama:latest
    container_name: parthi-ai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
